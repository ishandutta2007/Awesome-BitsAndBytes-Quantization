<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0d0e2e" />
      <stop offset="100%" stop-color="#05030f" />
    </linearGradient>
    <linearGradient id="neon-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b92b27" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38ef7d" />
      <stop offset="100%" stop-color="#11998e" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes pulse {
      0% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.05); }
      100% { opacity: 0.3; transform: scale(1); }
    }
    @keyframes rotate-grid {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes matrix-glow {
      0% { fill: #00f2fe; filter: drop-shadow(0 0 2px #00f2fe); }
      50% { fill: #38ef7d; filter: drop-shadow(0 0 8px #38ef7d); }
      100% { fill: #00f2fe; filter: drop-shadow(0 0 2px #00f2fe); }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    .grid-bg {
      stroke: #1f1a3a;
      stroke-width: 1;
    }
    .pulsing-node {
      animation: pulse 4s infinite ease-in-out;
    }
    .matrix-element {
      animation: matrix-glow 3s infinite ease-in-out;
    }
    .floating-text {
      animation: float 6s infinite ease-in-out;
    }
    .title-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 54px;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      fill: #9d9dbd;
      font-size: 20px;
      letter-spacing: 4px;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Grid Pattern -->
  <g opacity="0.6">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250 M 0,300 L 1200,300 M 0,350 L 1200,350" class="grid-bg" />
    <path d="M 100,0 L 100,400 M 200,0 L 200,400 M 300,0 L 300,400 M 400,0 L 400,400 M 500,0 L 500,400 M 600,0 L 600,400 M 700,0 L 700,400 M 800,0 L 800,400 M 900,0 L 900,400 M 1000,0 L 1000,400 M 1100,0 L 1100,400" class="grid-bg" />
  </g>

  <!-- Graphic Elements (Neural Net / Quantization representation) -->
  <g transform="translate(100, 200)">
    <!-- FP16 Node -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="url(#neon-blue)" stroke-width="3" filter="url(#glow)" />
    <text x="0" y="8" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">FP16</text>
    <line x1="45" y1="0" x2="155" y2="0" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5" />
    
    <!-- Compress Arrow -->
    <path d="M 90 -10 L 110 0 L 90 10 Z" fill="#00f2fe" class="pulsing-node" />

    <!-- INT8/4 Node -->
    <circle cx="200" cy="0" r="45" fill="none" stroke="url(#neon-green)" stroke-width="3" filter="url(#glow)" />
    <text x="200" y="8" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="18" text-anchor="middle">INT4/8</text>
  </g>

  <!-- Glowing background blobs -->
  <circle cx="1000" cy="100" r="120" fill="#7f00ff" opacity="0.15" filter="url(#glow)" class="pulsing-node" />
  <circle cx="150" cy="300" r="100" fill="#00f2fe" opacity="0.1" filter="url(#glow)" class="pulsing-node" />

  <!-- Matrix/Grid Animation (representing quantization cells) -->
  <g transform="translate(900, 120)">
    <!-- 4x4 matrix grid -->
    <rect class="matrix-element" x="0" y="0" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.1s" />
    <rect class="matrix-element" x="40" y="0" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.3s" />
    <rect class="matrix-element" x="80" y="0" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.5s" />
    <rect class="matrix-element" x="120" y="0" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.7s" />

    <rect class="matrix-element" x="0" y="40" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.9s" />
    <rect class="matrix-element" x="40" y="40" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.2s" />
    <rect class="matrix-element" x="80" y="40" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.4s" />
    <rect class="matrix-element" x="120" y="40" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.6s" />

    <rect class="matrix-element" x="0" y="80" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.8s" />
    <rect class="matrix-element" x="40" y="80" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 1.1s" />
    <rect class="matrix-element" x="80" y="80" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.1s" />
    <rect class="matrix-element" x="120" y="80" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.3s" />

    <rect class="matrix-element" x="0" y="120" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.5s" />
    <rect class="matrix-element" x="40" y="120" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.7s" />
    <rect class="matrix-element" x="80" y="120" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 0.9s" />
    <rect class="matrix-element" x="120" y="120" width="30" height="30" rx="5" fill="#00f2fe" style="animation-delay: 1.2s" />
  </g>

  <!-- Title & Subtitle -->
  <g transform="translate(380, 190)" class="floating-text">
    <text x="0" y="0" class="title-text" filter="url(#glow)">Awesome BitsAndBytes</text>
    <text x="0" y="45" class="title-text" fill="url(#neon-blue)" filter="url(#glow)">Quantization</text>
    <text x="5" y="90" class="subtitle-text">EVOLUTION • VARIANTS • APPLICATIONS</text>
  </g>
</svg>
